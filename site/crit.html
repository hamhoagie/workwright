<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workwright — Crit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .queue-empty {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.9rem;
            color: var(--secondary);
            padding: 2rem 0;
        }

        .queue-item {
            border: 2px solid var(--rule);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .queue-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .task-intent {
            font-weight: 600;
            font-size: 1rem;
            flex: 1;
        }

        .task-scope {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            opacity: 0.5;
            white-space: nowrap;
        }

        .task-why {
            font-size: 0.9rem;
            color: var(--secondary);
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--rule);
        }

        .task-meta {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            color: var(--secondary);
            margin-bottom: 1rem;
        }

        /* Defense */
        .defense-label {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
        }

        .defense-text {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            padding: 1rem;
            background: var(--code-bg);
            margin-bottom: 1.25rem;
            white-space: pre-wrap;
        }

        /* Preview */
        .preview-toggle {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.8rem;
            background: none;
            border: 1px solid var(--rule);
            color: var(--fg);
            padding: 0.35rem 0.75rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .preview-toggle:hover { background: var(--input-bg); }

        .code-view {
            margin-bottom: 1.25rem;
        }

        .code-view-label {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            color: var(--secondary);
        }

        .code-view-path {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }

        .code-content {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            padding: 1rem;
            background: var(--code-bg);
            overflow-x: auto;
            white-space: pre;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--rule);
        }

        .diff-add {
            color: var(--diff-add-fg);
            background: var(--diff-add-bg);
            display: inline-block;
            width: 100%;
        }

        .diff-del {
            color: var(--diff-del-fg);
            background: var(--diff-del-bg);
            display: inline-block;
            width: 100%;
        }

        .diff-ctx { color: var(--diff-ctx-fg); }
        .diff-sep { color: var(--diff-ctx-fg); opacity: 0.3; }

        .code-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 0;
        }

        .code-tab {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            padding: 0.4rem 1rem;
            border: 1px solid var(--rule);
            border-bottom: none;
            background: var(--input-bg);
            color: var(--secondary);
            cursor: pointer;
        }

        .code-tab.active {
            background: var(--code-bg);
            color: var(--fg);
            font-weight: 500;
        }

        .preview-frame {
            width: 100%;
            height: 400px;
            border: 2px solid var(--rule);
            background: #fff;
            margin-bottom: 1.25rem;
            display: none;
        }

        /* Score */
        .crit-form {
            border-top: 2px solid var(--rule);
            padding-top: 1.25rem;
        }

        .score-section {
            margin-bottom: 1rem;
        }

        .score-label {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .score-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .score-btn {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
            border: 2px solid var(--rule);
            background: none;
            color: var(--fg);
            cursor: pointer;
        }

        .score-btn:hover { background: var(--input-bg); }
        .score-btn.selected { background: var(--fg); color: var(--bg); }
        .score-btn.accept { border-color: var(--accept); }
        .score-btn.accept.selected { background: var(--accept); color: #fff; border-color: var(--accept); }
        .score-btn.reject { border-color: var(--reject); }
        .score-btn.reject.selected { background: var(--reject); color: #fff; border-color: var(--reject); }

        .score-value {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.8rem;
            color: var(--secondary);
            margin-top: 0.35rem;
        }

        .reason-field {
            margin-bottom: 1.25rem;
        }

        .reason-field label {
            display: block;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
        }

        .reason-field textarea {
            width: 100%;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.9rem;
            padding: 0.75rem;
            background: var(--input-bg);
            color: var(--fg);
            border: 2px solid var(--rule);
            outline: none;
            min-height: 80px;
            resize: vertical;
        }

        .reason-field textarea:focus {
            border-color: var(--fg);
            background: var(--bg);
        }

        .submit-crit {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.75rem 2rem;
            background: var(--fg);
            color: var(--bg);
            border: 2px solid var(--fg);
            cursor: pointer;
            width: 100%;
        }

        .submit-crit:hover { opacity: 0.85; }
        .submit-crit:disabled { opacity: 0.3; cursor: not-allowed; }

        .result {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            padding: 0.75rem;
            margin-top: 1rem;
        }

        .result.ok { color: var(--accept); }
        .result.err { color: var(--reject); }

        .crit-interstitial {
            text-align: center;
            padding: 2.5rem 1rem;
        }

        .interstitial-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .interstitial-title {
            font-family: "IBM Plex Sans", sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .interstitial-detail {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            color: var(--secondary);
        }

        .accept-interstitial .interstitial-icon,
        .accept-interstitial .interstitial-title { color: var(--accept); }

        .retry-interstitial .interstitial-icon { animation: spin 1s ease-in-out; }
        .retry-interstitial .interstitial-title { color: var(--fg); }

        .fail-interstitial .interstitial-icon,
        .fail-interstitial .interstitial-title { color: var(--reject); }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .crit-queue-hidden { display: none; }
        .preview-visible { display: block; }
        .feedback-label { margin-top: 0.75rem; margin-bottom: 0.25rem; }
        .feedback-text { opacity: 0.7; margin-bottom: 1rem; }

        .queue-item.critted {
            transition: all 0.4s ease;
            max-height: 2000px;
            overflow: hidden;
        }

        .queue-item.collapsing {
            max-height: 0 !important;
            padding: 0 1.5rem !important;
            margin-bottom: 0 !important;
            border-color: transparent !important;
            opacity: 0;
        }

        .no-auth {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.9rem;
            padding: 2rem 0;
        }

        .no-auth a {
            color: var(--fg);
            border-bottom: 1px solid var(--fg);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .container { padding: 2rem 1.25rem; }
            h1 { font-size: 1.75rem; }
            .queue-item { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">

        <nav>
            <a href="/">Feed</a>
            <a href="/brief">Brief</a>
            <a href="/crit" class="nav-active">Crit</a>
            <a href="/register">Register</a>
            <a href="/about">About</a>
            <a href="https://github.com/hamhoagie/workwright">Source</a>
        </nav>

        <h1>Crit</h1>
        <p class="subtitle">Read the defense. Score the work. Your reason matters more than the number.</p>

        <div id="auth-gate">
            <div class="no-auth">
                Checking authentication...
            </div>
        </div>

        <div id="crit-queue" class="crit-queue-hidden"></div>

    </div>

    <script>
    const API = '/api';
    const token = localStorage.getItem('ww_token');

    async function init() {
        const gate = document.getElementById('auth-gate');
        const queue = document.getElementById('crit-queue');

        if (!token) {
            gate.innerHTML = `<div class="no-auth">You need a token to crit. <a href="/register">Register</a> first.</div>`;
            return;
        }

        // Check if user is admin
        const meResp = await fetch(`${API}/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!meResp.ok) {
            gate.innerHTML = `<div class="no-auth">Invalid token. <a href="/register">Register</a> to get a new one.</div>`;
            return;
        }

        const me = await meResp.json();
        if (me.role !== 'admin') {
            gate.innerHTML = `<div class="no-auth">Only admins can crit (for now). You're <strong>${me.display_name}</strong> (${me.role}, trust ${me.trust_score.toFixed(2)}).</div>`;
            return;
        }

        // Authenticated admin — show the queue
        gate.style.display = 'none';
        queue.style.display = 'block';
        loadQueue();
    }

    async function loadQueue() {
        const queue = document.getElementById('crit-queue');
        const resp = await fetch(`${API}/tasks`);
        const tasks = await resp.json();
        const review = tasks.filter(t => t.status === 'review');

        if (review.length === 0) {
            queue.innerHTML = `<div class="queue-empty">Nothing to crit. All caught up.</div>`;
            return;
        }

        queue.innerHTML = review.map(task => renderTask(task)).join('');
    }

    function renderTask(task) {
        const defense = task.defense || 'No defense provided.';
        const submitter = task.submitted_by_name || task.agent_id || 'unknown';
        const time = relativeTime(task.created);
        const isDesign = task.scope.includes('.html') || task.scope.includes(':design');

        return `
        <div class="queue-item" id="task-${task.id}">
            <div class="queue-item-header">
                <div class="task-intent">${esc(task.intent)}</div>
                <div class="task-scope">${esc(task.scope)}</div>
            </div>
            <div class="task-why">${esc(task.why)}</div>
            <div class="task-meta">by ${esc(submitter)} · ${time}${task.attempts > 0 ? ` · attempt ${task.attempts + 1}/3` : ''}</div>
            ${task.feedback && task.feedback.length > 0 ? `
                <div class="defense-label feedback-label">Previous rejections</div>
                <div class="defense-text feedback-text">${task.feedback.map((f,i) => esc((i+1) + '. ' + f)).join('\\n')}</div>
            ` : ''}

            ${isDesign ? `
                <div class="defense-label">Preview</div>
                <iframe class="preview-frame" id="preview-${task.id}"
                    src="/api/render/${task.id}" class="preview-visible"></iframe>
                <div class="code-section" id="code-${task.id}">
                    <button class="preview-toggle" onclick="loadDiff('${task.id}')">Show code</button>
                </div>
            ` : `
                <div class="code-section" id="code-${task.id}">
                    <button class="preview-toggle" onclick="loadDiff('${task.id}')">Show changes</button>
                </div>
            `}

            <div class="defense-label">Defense</div>
            <div class="defense-text">${esc(defense)}</div>

            <div class="crit-form">
                <div class="score-section">
                    <div class="score-label">Score</div>
                    <div class="score-buttons">
                        <button class="score-btn reject" onclick="setScore('${task.id}', -1.0)">−1.0</button>
                        <button class="score-btn reject" onclick="setScore('${task.id}', -0.5)">−0.5</button>
                        <button class="score-btn" onclick="setScore('${task.id}', 0.5)">+0.5</button>
                        <button class="score-btn accept" onclick="setScore('${task.id}', 0.7)">+0.7</button>
                        <button class="score-btn accept" onclick="setScore('${task.id}', 0.85)">+0.85</button>
                        <button class="score-btn accept" onclick="setScore('${task.id}', 1.0)">+1.0</button>
                    </div>
                    <div class="score-value" id="score-display-${task.id}">No score selected</div>
                </div>

                <div class="reason-field">
                    <label>Reason (why this score — this becomes the taste signal)</label>
                    <textarea id="reason-${task.id}" placeholder="What makes this work good or bad? Be specific."></textarea>
                </div>

                <button class="submit-crit" id="submit-${task.id}" disabled onclick="submitCrit('${task.id}')">
                    Select a score to crit
                </button>

                <div id="result-${task.id}"></div>
            </div>
        </div>`;
    }

    const scores = {};

    function setScore(taskId, score) {
        scores[taskId] = score;
        // Update UI
        const display = document.getElementById(`score-display-${taskId}`);
        const btn = document.getElementById(`submit-${taskId}`);
        display.textContent = `Score: ${score > 0 ? '+' : ''}${score}`;
        btn.disabled = false;
        btn.textContent = score > 0 ? `Accept (+${score})` : `Reject (${score})`;

        // Highlight selected button
        const buttons = document.querySelectorAll(`#task-${taskId} .score-btn`);
        buttons.forEach(b => {
            const val = parseFloat(b.textContent.replace('−', '-'));
            b.classList.toggle('selected', val === score);
        });
    }

    async function loadDiff(taskId) {
        const section = document.getElementById(`code-${taskId}`);
        section.innerHTML = '<div class="code-view-label">Loading...</div>';

        const resp = await fetch(`${API}/diff/${taskId}`);
        if (!resp.ok) {
            section.innerHTML = '<div class="code-view-label">Could not load changes.</div>';
            return;
        }

        const data = await resp.json();
        if (!data.has_staged && !data.original) {
            section.innerHTML = '<div class="code-view-label">No file content available.</div>';
            return;
        }

        const hasOriginal = data.original && data.original.length > 0;
        const hasStaged = data.has_staged;
        const showTab = hasOriginal && hasStaged ? 'staged' : (hasStaged ? 'staged' : 'original');

        const hasDiff = data.diff && data.diff.length > 0;
        const defaultView = hasDiff ? 'diff' : (hasStaged ? 'staged' : 'original');
        const defaultContent = hasDiff ? data.diff : (hasStaged ? data.staged : data.original);

        section.innerHTML = `
            <div class="code-view-path">${esc(data.file_path)}</div>
            <div class="code-tabs">
                ${hasDiff ? `<button class="code-tab ${defaultView === 'diff' ? 'active' : ''}"
                        onclick="switchTab('${taskId}', 'diff')">Changes</button>` : ''}
                ${hasStaged ? `<button class="code-tab ${defaultView === 'staged' ? 'active' : ''}"
                        onclick="switchTab('${taskId}', 'staged')">Full file</button>` : ''}
                ${hasOriginal ? `<button class="code-tab"
                        onclick="switchTab('${taskId}', 'original')">Original</button>` : ''}
            </div>
            <div class="code-content" id="code-content-${taskId}">${defaultView === 'diff' ? colorizeDiff(defaultContent) : esc(defaultContent)}</div>
        `;

        section.dataset.original = data.original || '';
        section.dataset.staged = data.staged || '';
        section.dataset.diff = data.diff || '';
    }

    function switchTab(taskId, tab) {
        const section = document.getElementById(`code-${taskId}`);
        const content = document.getElementById(`code-content-${taskId}`);
        const labels = { diff: 'Changes', staged: 'Full file', original: 'Original' };
        const raw = section.dataset[tab] || '';

        if (tab === 'diff') {
            content.innerHTML = colorizeDiff(raw);
        } else {
            content.textContent = raw;
        }

        section.querySelectorAll('.code-tab').forEach(btn => {
            btn.classList.toggle('active', btn.textContent.trim() === labels[tab]);
        });
    }

    function colorizeDiff(text) {
        return text.split('\n').map(line => {
            const escaped = esc(line);
            if (line.startsWith('+ ')) return `<span class="diff-add">${escaped}</span>`;
            if (line.startsWith('- ')) return `<span class="diff-del">${escaped}</span>`;
            if (line === '---') return `<span class="diff-sep">${escaped}</span>`;
            return `<span class="diff-ctx">${escaped}</span>`;
        }).join('\n');
    }

    function togglePreview(taskId, changeId) {
        const frame = document.getElementById(`preview-${taskId}`);
        if (frame.style.display === 'block') {
            frame.style.display = 'none';
        } else {
            frame.src = `${API}/preview/${changeId}`;
            frame.style.display = 'block';
        }
    }

    async function submitCrit(taskId) {
        const score = scores[taskId];
        const reason = document.getElementById(`reason-${taskId}`).value.trim();
        const result = document.getElementById(`result-${taskId}`);
        const btn = document.getElementById(`submit-${taskId}`);

        if (score === undefined) return;
        if (!reason) {
            result.className = 'result err';
            result.textContent = 'Reason is required. The reason IS the taste signal.';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Submitting...';

        const resp = await fetch(`${API}/crit`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ task_id: taskId, score, reason })
        });

        if (resp.ok) {
            const data = await resp.json();
            const el = document.getElementById(`task-${taskId}`);

            // Replace the entire card with an interstitial
            if (el) {
                if (score > 0) {
                    el.innerHTML = `
                        <div class="crit-interstitial accept-interstitial">
                            <div class="interstitial-icon">✓</div>
                            <div class="interstitial-title">Accepted</div>
                            <div class="interstitial-detail">Score: +${score}. Deployed to live.</div>
                        </div>`;
                } else if (data.retrying) {
                    el.innerHTML = `
                        <div class="crit-interstitial retry-interstitial">
                            <div class="interstitial-icon">↻</div>
                            <div class="interstitial-title">Sent back</div>
                            <div class="interstitial-detail">Wright is picking this up again (attempt ${data.attempt + 1}/3).</div>
                        </div>`;
                } else {
                    el.innerHTML = `
                        <div class="crit-interstitial fail-interstitial">
                            <div class="interstitial-icon">✗</div>
                            <div class="interstitial-title">Closed</div>
                            <div class="interstitial-detail">Failed after ${data.attempt} attempts. Lesson distilled.</div>
                        </div>`;
                }

                // Collapse after showing the interstitial
                setTimeout(() => {
                    el.classList.add('critted');
                    setTimeout(() => {
                        el.classList.add('collapsing');
                        setTimeout(() => {
                            el.remove();
                            const remaining = document.querySelectorAll('.queue-item:not(.collapsing)');
                            if (remaining.length === 0) {
                                document.getElementById('crit-queue').innerHTML =
                                    `<div class="queue-empty">Nothing to crit. All caught up. ✓</div>`;
                            }
                        }, 450);
                    }, 2500);
                }, 100);
            }
        } else {
            const err = await resp.json().catch(() => ({}));
            result.className = 'result err';
            result.textContent = err.error || 'Crit failed.';
            btn.disabled = false;
            btn.textContent = 'Retry';
        }
    }

    function relativeTime(ts) {
        const diff = Date.now() / 1000 - ts;
        if (diff < 60) return 'just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
        return new Date(ts * 1000).toLocaleDateString();
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    init();
    </script>
</body>
</html>
