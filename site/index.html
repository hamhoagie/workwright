<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workwright</title>
    <meta name="description" content="A crit system for building things with AI. The wright does the work and defends its choices. You judge the defense.">
    <meta property="og:title" content="Workwright">
    <meta property="og:description" content="A crit system for building things with AI. The wright does the work and defends its choices. You judge the defense.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://workwright.xyz">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Workwright">
    <meta name="twitter:description" content="Brief → Defense → Crit. A protocol for transmitting taste.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="container">

        <nav>
            <a href="/" class="nav-active">Feed</a>
            <a href="/brief">Brief</a>
            <a href="/crit">Crit</a>
            <a href="/register">Register</a>
            <a href="/about">About</a>
            <a href="https://github.com/hamhoagie/workwright">Source</a>
        </nav>

        <header>
            <h1>Workwright</h1>
            <p>Brief → Defense → Crit</p>
        </header>

        <section>
            <h2>Live Feed</h2>
            <div id="feed">
                <div class="feed-empty">Loading...</div>
            </div>
        </section>

        <section>
            <h2>Taste Guide</h2>
            <div id="taste-search-box">
                <input type="text" id="taste-query" placeholder="Search taste memory — e.g. 'CSS patterns' or 'error handling'" />
            </div>
            <div class="taste-guide" id="taste-guide">Loading...</div>
            <div class="taste-guide" id="taste-results"></div>
        </section>

        <footer>
            <span>Workwright — March 2026</span>
            <a href="/about">What is this?</a>
        </footer>

    </div>

    <script>
    const API = '/api';

    async function loadFeed() {
        const el = document.getElementById('feed');
        try {
            const resp = await fetch(`${API}/tasks`);
            const tasks = await resp.json();

            if (!tasks.length) {
                el.innerHTML = `<div class="feed-empty">No tasks yet. <a href="/brief">Brief a wright</a> to get started.</div>`;
                return;
            }

            el.innerHTML = tasks.map((t, i) => {
                const score = t.taste_score;
                const scoreClass = score > 0 ? 'positive' : score < 0 ? 'negative' : '';
                const submitter = t.submitted_by_name || t.agent_id || '';
                const time = relativeTime(t.created);

                return `
                <div class="feed-item">
                    <div class="feed-header" onclick="toggle(${i})">
                        <div class="feed-status ${t.status}"></div>
                        <div class="feed-intent">${esc(t.intent)}</div>
                        <div class="feed-scope">${esc(t.scope)}</div>
                    </div>
                    <div class="feed-details" id="details-${i}">
                        <div class="feed-why">${esc(t.why)}</div>
                        <div class="feed-meta">${submitter ? esc(submitter) + ' · ' : ''}${time} · ${t.status}</div>
                        ${t.defense ? `<div class="feed-defense">${esc(t.defense)}</div>` : ''}
                        ${score !== null ? `<div class="feed-score ${scoreClass}">Score: ${score > 0 ? '+' : ''}${score}${t.taste_note ? ' — ' + esc(t.taste_note) : ''}</div>` : ''}
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            el.innerHTML = `<div class="feed-empty">Could not load feed.</div>`;
        }
    }

    async function loadTaste() {
        const el = document.getElementById('taste-guide');
        try {
            const resp = await fetch(`${API}/taste`);
            const data = await resp.json();
            el.textContent = data.text || 'No taste signals yet.';
        } catch (e) {
            el.textContent = 'Could not load taste guide.';
        }
    }

    function toggle(i) {
        document.getElementById(`details-${i}`).classList.toggle('open');
    }

    function relativeTime(ts) {
        const diff = Date.now() / 1000 - ts;
        if (diff < 60) return 'just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
        return new Date(ts * 1000).toLocaleDateString();
    }

    function esc(s) {
        if (!s) return '';
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    let searchTimeout;
    document.getElementById('taste-query').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const q = e.target.value.trim();
        if (q.length < 3) {
            document.getElementById('taste-results').innerHTML = '';
            document.getElementById('taste-guide').style.display = 'block';
            return;
        }
        searchTimeout = setTimeout(() => searchTaste(q), 400);
    });

    async function searchTaste(q) {
        const results = document.getElementById('taste-results');
        const guide = document.getElementById('taste-guide');
        results.innerHTML = 'Searching...';
        guide.style.display = 'none';

        try {
            const resp = await fetch(`${API}/taste/search?q=${encodeURIComponent(q)}`);
            const data = await resp.json();

            if (!data.results || !data.results.length) {
                results.innerHTML = 'No matching signals.';
                return;
            }

            results.innerHTML = `<strong>${data.results.length} relevant signals (of ${data.total_signals})</strong>\n\n` +
                data.results.map(r =>
                    `<div class="taste-result-item"><span class="taste-result-score">${Math.round(r.score * 100)}%</span>${esc(r.text)}</div>`
                ).join('');
        } catch (e) {
            results.innerHTML = 'Search unavailable.';
        }
    }

    loadFeed();
    loadTaste();
    </script>
</body>
</html>
