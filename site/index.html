<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workwright</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fg: #000;
            --bg: #fff;
            --secondary: #1a1a1a;
            --rule: #000;
            --input-bg: #f5f5f5;
            --code-bg: #f0f0f0;
            --accept: #1a7a1a;
            --reject: #7a1a1a;
            color-scheme: light dark;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --fg: #fff;
                --bg: #0a0a0a;
                --secondary: #e0e0e0;
                --rule: #fff;
                --input-bg: #1a1a1a;
                --code-bg: #151515;
                --accept: #4ade80;
                --reject: #f87171;
            }
        }

        :root[data-theme="light"] {
            --fg: #000;
            --bg: #fff;
            --secondary: #1a1a1a;
            --rule: #000;
            --input-bg: #f5f5f5;
            --code-bg: #f0f0f0;
            --accept: #1a7a1a;
            --reject: #7a1a1a;
            color-scheme: light;
        }

        :root[data-theme="dark"] {
            --fg: #fff;
            --bg: #0a0a0a;
            --secondary: #e0e0e0;
            --rule: #fff;
            --input-bg: #1a1a1a;
            --code-bg: #151515;
            --accept: #4ade80;
            --reject: #f87171;
            color-scheme: dark;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "IBM Plex Sans", sans-serif;
            font-weight: 400;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        nav {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav a {
            color: var(--fg);
            text-decoration: none;
            opacity: 0.5;
        }

        nav a:hover { opacity: 0.8; }
        nav a.nav-active { opacity: 1; border-bottom: 2px solid var(--fg); }

        .theme-toggle {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--fg);
            opacity: 0.5;
            padding: 0;
            line-height: 1;
        }

        .theme-toggle:hover { opacity: 0.8; }

        /* ---- HEADER ---- */

        header {
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.125rem;
            color: var(--secondary);
        }

        /* ---- SECTIONS ---- */

        section {
            margin-bottom: 3rem;
        }

        h2 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--fg);
        }

        /* ---- LIVE FEED ---- */

        .feed-empty {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.9rem;
            color: var(--secondary);
            padding: 2rem 0;
        }

        .feed-item {
            padding: 1.25rem 0;
            border-bottom: 1px solid var(--rule);
        }

        .feed-item:first-child {
            border-top: 1px solid var(--rule);
        }

        .feed-meta {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.8rem;
            color: var(--secondary);
            margin-bottom: 0.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .feed-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--fg);
        }

        .feed-status.pending { opacity: 0.3; }
        .feed-status.active { background: #f59e0b; }
        .feed-status.review { background: #3b82f6; }
        .feed-status.accepted { background: var(--accept); }
        .feed-status.rejected { background: var(--reject); }

        .feed-intent {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .feed-why {
            font-size: 0.95rem;
            color: var(--secondary);
            margin-bottom: 0.75rem;
        }

        .feed-defense {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            padding: 1rem;
            background: var(--code-bg);
            margin-bottom: 0.75rem;
        }

        .feed-defense::before {
            content: "Defense: ";
            font-weight: 500;
        }

        .feed-score {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
        }

        .feed-score .positive { color: var(--accept); }
        .feed-score .negative { color: var(--reject); }

        .feed-item { cursor: pointer; }

        .feed-detail {
            display: none;
            margin-top: 0.75rem;
        }

        .feed-item.expanded .feed-detail {
            display: block;
        }

        .feed-diff {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            padding: 1rem;
            background: var(--code-bg);
            margin-bottom: 0.75rem;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .feed-expand-hint {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            color: var(--secondary);
            opacity: 0.6;
        }

        .preview-frame {
            width: 100%;
            height: 400px;
            border: 2px solid var(--rule);
            background: #fff;
            margin-bottom: 0.75rem;
        }

        .preview-label {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
            color: var(--secondary);
        }

        .preview-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 0.5rem;
        }

        .preview-tabs button {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.35rem 1rem;
            border: 2px solid var(--rule);
            background: var(--bg);
            color: var(--fg);
            cursor: pointer;
        }

        .preview-tabs button:first-child { border-right: none; }
        .preview-tabs button.active { background: var(--fg); color: var(--bg); }

        /* ---- PROPOSE FORM ---- */

        .propose-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .field label {
            display: block;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
        }

        .field input,
        .field textarea {
            width: 100%;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.9rem;
            padding: 0.75rem;
            background: var(--input-bg);
            color: var(--fg);
            border: 2px solid var(--rule);
            outline: none;
        }

        .field textarea {
            min-height: 80px;
            resize: vertical;
        }

        .field input:focus,
        .field textarea:focus {
            border-color: var(--fg);
            background: var(--bg);
        }

        button.submit {
            font-family: "IBM Plex Sans", sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.75rem 1.5rem;
            background: var(--fg);
            color: var(--bg);
            border: 2px solid var(--fg);
            cursor: pointer;
            align-self: flex-start;
        }

        button.submit:hover {
            background: var(--bg);
            color: var(--fg);
        }

        /* ---- TASTE GUIDE ---- */

        .taste-guide {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            padding: 1.5rem;
            background: var(--code-bg);
        }

        .taste-guide h3 {
            font-family: "IBM Plex Sans", sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.75rem;
        }

        .taste-guide ul {
            list-style: none;
            margin-bottom: 1rem;
        }

        .taste-guide li::before {
            content: "→ ";
        }

        /* ---- CRIT PANEL ---- */

        .crit-panel {
            padding: 1rem;
            border: 2px solid var(--rule);
            margin-top: 0.75rem;
            display: none;
        }

        .crit-panel.open {
            display: block;
        }

        .crit-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-top: 0.75rem;
        }

        .crit-actions input {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            padding: 0.5rem;
            background: var(--input-bg);
            color: var(--fg);
            border: 2px solid var(--rule);
            flex: 1;
        }

        .crit-btn {
            font-family: "IBM Plex Mono", monospace;
            font-weight: 500;
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
            border: 2px solid var(--rule);
            background: var(--bg);
            color: var(--fg);
            cursor: pointer;
        }

        .crit-btn:hover {
            background: var(--fg);
            color: var(--bg);
        }

        /* ---- SCOPE TOGGLE ---- */

        .scope-toggle {
            display: flex;
            gap: 0;
        }

        .scope-btn {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 1.25rem;
            border: 2px solid var(--rule);
            background: var(--bg);
            color: var(--fg);
            cursor: pointer;
        }

        .scope-btn:first-child {
            border-right: none;
        }

        .scope-btn.active {
            background: var(--fg);
            color: var(--bg);
        }

        .scope-btn:hover:not(.active) {
            opacity: 0.7;
        }

        .feed-scope-tag {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.15em 0.4em;
            border: 1px solid var(--fg);
            display: inline-block;
        }

        /* ---- PRINCIPLES ---- */

        .principles {
            margin-bottom: 0;
        }

        .principle {
            padding: 1rem 0;
            border-bottom: 1px solid var(--rule);
        }

        .principle:first-child {
            border-top: 1px solid var(--rule);
        }

        .principle strong {
            display: block;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .principle span {
            color: var(--secondary);
            font-size: 0.95rem;
        }

        /* ---- FOOTER ---- */

        footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--rule);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--secondary);
        }

        footer a {
            color: var(--fg);
            text-decoration: none;
            border-bottom: 1px solid var(--fg);
        }

        footer a:hover { opacity: 0.7; }

        /* ---- RESPONSIVE ---- */

        @media (max-width: 600px) {
            .container { padding: 2rem
