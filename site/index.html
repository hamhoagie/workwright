<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workwright</title>
    <meta name="description" content="A crit system for building things with AI. The wright does the work and defends its choices. You judge the defense.">
    <meta property="og:title" content="Workwright">
    <meta property="og:description" content="A crit system for building things with AI. The wright does the work and defends its choices. You judge the defense.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://workwright.xyz">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Workwright">
    <meta name="twitter:description" content="Brief → Defense → Crit. A protocol for transmitting taste.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fg: #000;
            --bg: #fff;
            --secondary: #1a1a1a;
            --rule: #000;
            --code-bg: #f0f0f0;
            --accept: #1a7a1a;
            --reject: #7a1a1a;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --fg: #fff;
                --bg: #0a0a0a;
                --secondary: #e0e0e0;
                --rule: #fff;
                --code-bg: #151515;
                --accept: #4ade80;
                --reject: #f87171;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "IBM Plex Sans", sans-serif;
            font-weight: 400;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.55;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        nav {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--fg);
            text-decoration: none;
            opacity: 0.5;
        }

        nav a:hover { opacity: 0.8; }
        nav a.nav-active { opacity: 1; border-bottom: 2px solid var(--fg); }

        header { margin-bottom: 3rem; }

        h1 {
            font-size: 2.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.125rem;
            color: var(--secondary);
        }

        section { margin-bottom: 3rem; }

        h2 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1.25rem;
        }

        /* ---- FEED ---- */

        .feed-item {
            padding: 1.25rem 0;
            border-bottom: 1px solid var(--rule);
        }

        .feed-item:first-child { border-top: 1px solid var(--rule); }

        .feed-header {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            cursor: pointer;
        }

        .feed-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--fg);
            flex-shrink: 0;
        }

        .feed-status.pending { opacity: 0.3; }
        .feed-status.active { opacity: 0.5; animation: pulse 1.5s infinite; }
        .feed-status.review { opacity: 0.7; }
        .feed-status.accepted { background: var(--accept); }
        .feed-status.rejected { background: var(--reject); }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .feed-intent {
            flex: 1;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .feed-scope {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.7rem;
            opacity: 0.4;
        }

        .feed-details {
            display: none;
            padding: 1rem 0 0 1.5rem;
        }

        .feed-details.open { display: block; }

        .feed-why {
            font-size: 0.9rem;
            color: var(--secondary);
            margin-bottom: 0.75rem;
        }

        .feed-meta {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.75rem;
            color: var(--secondary);
            margin-bottom: 0.75rem;
        }

        .feed-defense {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            padding: 1rem;
            background: var(--code-bg);
            margin-bottom: 0.75rem;
            white-space: pre-wrap;
        }

        .feed-defense::before {
            content: "Defense: ";
            font-weight: 500;
        }

        .feed-score {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.8rem;
        }

        .feed-score.positive { color: var(--accept); }
        .feed-score.negative { color: var(--reject); }

        .feed-empty {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.9rem;
            color: var(--secondary);
            padding: 2rem 0;
        }

        .feed-empty a {
            color: var(--fg);
            border-bottom: 1px solid var(--fg);
            text-decoration: none;
        }

        /* ---- TASTE ---- */

        .taste-guide {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* ---- FOOTER ---- */

        footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--rule);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--secondary);
        }

        footer a {
            color: var(--fg);
            text-decoration: none;
            border-bottom: 1px solid var(--fg);
        }

        footer a:hover { opacity: 0.7; }

        @media (max-width: 600px) {
            .container { padding: 2rem 1.25rem; }
            h1 { font-size: 2rem; }
            .feed-scope { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">

        <nav>
            <a href="/" class="nav-active">Feed</a>
            <a href="/brief">Brief</a>
            <a href="/crit">Crit</a>
            <a href="/register">Register</a>
            <a href="/about">About</a>
            <a href="https://github.com/hamhoagie/workwright">Source</a>
        </nav>

        <header>
            <h1>Workwright</h1>
            <p>Brief → Defense → Crit</p>
        </header>

        <section>
            <h2>Live Feed</h2>
            <div id="feed">
                <div class="feed-empty">Loading...</div>
            </div>
        </section>

        <section>
            <h2>Taste Guide</h2>
            <div class="taste-guide" id="taste-guide">Loading...</div>
        </section>

        <footer>
            <span>Workwright — March 2026</span>
            <a href="/about">What is this?</a>
        </footer>

    </div>

    <script>
    const API = '/api';

    async function loadFeed() {
        const el = document.getElementById('feed');
        try {
            const resp = await fetch(`${API}/tasks`);
            const tasks = await resp.json();

            if (!tasks.length) {
                el.innerHTML = `<div class="feed-empty">No tasks yet. <a href="/brief">Brief a wright</a> to get started.</div>`;
                return;
            }

            el.innerHTML = tasks.map((t, i) => {
                const score = t.taste_score;
                const scoreClass = score > 0 ? 'positive' : score < 0 ? 'negative' : '';
                const submitter = t.submitted_by_name || t.agent_id || '';
                const time = relativeTime(t.created);

                return `
                <div class="feed-item">
                    <div class="feed-header" onclick="toggle(${i})">
                        <div class="feed-status ${t.status}"></div>
                        <div class="feed-intent">${esc(t.intent)}</div>
                        <div class="feed-scope">${esc(t.scope)}</div>
                    </div>
                    <div class="feed-details" id="details-${i}">
                        <div class="feed-why">${esc(t.why)}</div>
                        <div class="feed-meta">${submitter ? esc(submitter) + ' · ' : ''}${time} · ${t.status}</div>
                        ${t.defense ? `<div class="feed-defense">${esc(t.defense)}</div>` : ''}
                        ${score !== null ? `<div class="feed-score ${scoreClass}">Score: ${score > 0 ? '+' : ''}${score}${t.taste_note ? ' — ' + esc(t.taste_note) : ''}</div>` : ''}
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            el.innerHTML = `<div class="feed-empty">Could not load feed.</div>`;
        }
    }

    async function loadTaste() {
        const el = document.getElementById('taste-guide');
        try {
            const resp = await fetch(`${API}/taste`);
            const data = await resp.json();
            el.textContent = data.text || 'No taste signals yet.';
        } catch (e) {
            el.textContent = 'Could not load taste guide.';
        }
    }

    function toggle(i) {
        document.getElementById(`details-${i}`).classList.toggle('open');
    }

    function relativeTime(ts) {
        const diff = Date.now() / 1000 - ts;
        if (diff < 60) return 'just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
        return new Date(ts * 1000).toLocaleDateString();
    }

    function esc(s) {
        if (!s) return '';
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    loadFeed();
    loadTaste();
    </script>
</body>
</html>
